name: CI

on:
  push:
    branches: [main, "rebuild/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      # Follow checkout's stable major; setup-uv v8 publishes immutable release tags only.
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.14
      - name: Sync
        run: uv sync --locked --all-groups
      - name: Format
        run: uv run ruff format --check
      - name: Lint
        run: uv run ruff check
      - name: Types
        run: uv run ty check
      - name: Tests
        run: uv run pytest
      - name: Build
        run: uv build --no-sources
      - name: Wheel smoke test
        shell: bash
        run: |
          uv venv .wheel-smoke --python 3.14
          uv pip install --python .wheel-smoke dist/*.whl
          .wheel-smoke/bin/modelscope-image-gen-mcp --version || .wheel-smoke/Scripts/modelscope-image-gen-mcp.exe --version
